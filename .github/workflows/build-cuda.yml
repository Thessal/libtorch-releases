name: Build libtorch aarch64 CUDA (DGX spark)

on:
  workflow_dispatch:
    inputs:
      torch_version:
        description: "PyTorch version (e.g. 2.9.0)"
        required: true
        default: "2.9.0"
      cuda_version:
        description: "CUDA toolkit apt version (e.g. 12-6). Available: 12-5, 12-6, 12-8, 12-9, 13-0, 13-1"
        required: true
        default: "13-0"
      cuda_arch_list:
        description: "TORCH_CUDA_ARCH_LIST (e.g. 8.7 for Jetson Orin, 12.1 for gb10)"
        required: true
        default: "12.1"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 360
    env:
      TORCH_VERSION: ${{ inputs.torch_version }}
      CUDA_VERSION: ${{ inputs.cuda_version }}
      CUDA_ARCH_LIST: ${{ inputs.cuda_arch_list }}

    steps:
      - uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          df -h

      - name: Add swap space
        run: |
          sudo swapoff -a
          sudo rm -f /swapfile
          sudo fallocate -l 8G /swapfile
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile
          free -h

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # ── Fast path: try to get a pre-built CUDA wheel ──

      - name: Try installing PyTorch CUDA from pip
        id: pip_install
        continue-on-error: true
        run: |
          CUDA_TAG="cu${CUDA_VERSION//-/}"
          echo "Trying PyTorch index for ${CUDA_TAG}..."
          # Use --index-url (not --extra-index-url) so pip does NOT fall back to PyPI
          pip install "torch==${TORCH_VERSION}" \
            --index-url "https://download.pytorch.org/whl/${CUDA_TAG}" || \
          pip install "torch==${TORCH_VERSION}" \
            --index-url "https://pypi.nvidia.com" || \
          exit 1
          # Verify this is actually a CUDA build, not CPU-only
          python3 -c "import torch; assert torch.version.cuda is not None, 'CPU-only build'; print(f'CUDA {torch.version.cuda} verified')"

      - name: Extract libtorch from pip install
        if: steps.pip_install.outcome == 'success'
        run: |
          TORCH_DIR=$(python3 -c "import torch; print(torch.__path__[0])")
          SITE_PACKAGES=$(python3 -c "import site; print(site.getsitepackages()[0])")
          mkdir -p libtorch
          cp -r "$TORCH_DIR/lib" libtorch/
          cp -r "$TORCH_DIR/include" libtorch/ 2>/dev/null || true
          cp -r "$TORCH_DIR/share" libtorch/ 2>/dev/null || true
          # Vendored .so files
          for dir in "$SITE_PACKAGES"/torch.libs "$TORCH_DIR/../torch.libs"; do
            if [ -d "$dir" ]; then
              echo "Copying from $dir"
              cp "$dir"/*.so* libtorch/lib/ 2>/dev/null || true
            fi
          done
          # NVIDIA libs bundled by pip (cublas, cudnn, etc.)
          for dir in "$SITE_PACKAGES"/nvidia/*/lib; do
            if [ -d "$dir" ]; then
              echo "Copying NVIDIA libs from $dir"
              cp "$dir"/*.so* libtorch/lib/ 2>/dev/null || true
            fi
          done

      # ── Slow path: build from source ──

      - name: Install system dependencies
        if: steps.pip_install.outcome != 'success'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential cmake ninja-build git \
            python3-dev libopenblas-dev liblapack-dev

      - name: Install Python build dependencies
        if: steps.pip_install.outcome != 'success'
        run: |
          pip install pyyaml typing_extensions numpy setuptools wheel

      - name: Install CUDA toolkit
        if: steps.pip_install.outcome != 'success'
        run: |
          wget -q https://developer.download.nvidia.com/compute/cuda/repos/ubuntu2404/sbsa/cuda-keyring_1.1-1_all.deb
          sudo dpkg -i cuda-keyring_1.1-1_all.deb
          sudo apt-get update
          sudo apt-get install -y cuda-toolkit-${CUDA_VERSION}
          echo "/usr/local/cuda/bin" >> "$GITHUB_PATH"
          echo "CUDA_HOME=/usr/local/cuda" >> "$GITHUB_ENV"
          /usr/local/cuda/bin/nvcc --version

      - name: Install cuDNN
        if: steps.pip_install.outcome != 'success'
        run: |
          CUDA_MAJOR=${CUDA_VERSION%%-*}
          sudo apt-get install -y libcudnn9-dev-cuda-${CUDA_MAJOR}

      - name: Clone PyTorch
        if: steps.pip_install.outcome != 'success'
        run: |
          git clone --branch "v${TORCH_VERSION}" --depth 1 \
            --recurse-submodules --shallow-submodules \
            https://github.com/pytorch/pytorch.git

      - name: Build libtorch from source
        if: steps.pip_install.outcome != 'success'
        run: |
          cd pytorch
          mkdir build && cd build
          cmake -GNinja \
            -DBUILD_SHARED_LIBS=ON \
            -DUSE_CUDA=ON \
            -DUSE_CUDNN=ON \
            -DUSE_NCCL=OFF \
            -DTORCH_CUDA_ARCH_LIST="${CUDA_ARCH_LIST}" \
            -DCMAKE_INSTALL_PREFIX=../install \
            -DCMAKE_LIBRARY_PATH=/usr/local/cuda/lib64/stubs \
            -DCMAKE_BUILD_TYPE=Release \
            ..
          # Limit parallelism to avoid OOM on ARM runners
          ninja -j$(( $(nproc) > 4 ? 4 : $(nproc) ))
          ninja install
          cd ../..
          mv pytorch/install libtorch

      # ── Common: verify, package, release ──

      - name: Verify and package
        run: |
          echo "=== Verifying libtorch ==="
          for lib in libtorch.so libc10.so libc10_cuda.so; do
            if [ -f "libtorch/lib/$lib" ]; then
              echo "OK: $lib"
            else
              echo "WARNING: $lib not found"
            fi
          done
          echo "Total libs: $(ls libtorch/lib/*.so* 2>/dev/null | wc -l)"
          ls libtorch/include/ 2>/dev/null && echo "OK: include dir present" || echo "WARNING: no include dir"

          CUDA_DOT=${CUDA_VERSION//-/.}
          tar czf "libtorch-cxx11-abi-aarch64-cuda${CUDA_DOT}-${TORCH_VERSION}.tar.gz" libtorch

      - name: Create release and upload
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v${TORCH_VERSION}"
          CUDA_DOT=${CUDA_VERSION//-/.}
          ASSET="libtorch-cxx11-abi-aarch64-cuda${CUDA_DOT}-${TORCH_VERSION}.tar.gz"
          gh release create "$TAG" \
            --title "Libtorch aarch64 v${TORCH_VERSION}" \
            --notes "Pre-built libtorch ${TORCH_VERSION} with CUDA ${CUDA_DOT} for Linux aarch64 (Jetson)." \
            "$ASSET" || \
          gh release upload "$TAG" "$ASSET" --clobber
