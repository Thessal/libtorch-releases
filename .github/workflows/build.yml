name: Build libtorch aarch64

on:
  workflow_dispatch:
    inputs:
      torch_version:
        description: "PyTorch version to package"
        required: true
        default: "2.10.0"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PyTorch
        run: pip install torch==${{ inputs.torch_version }}

      - name: Package libtorch
        run: |
          TORCH_DIR=$(python3 -c "import torch; print(torch.__path__[0])")
          TORCH_LIBS="$TORCH_DIR/../torch.libs"
          mkdir -p libtorch
          cp -r "$TORCH_DIR/lib" libtorch/
          cp -r "$TORCH_DIR/include" libtorch/ 2>/dev/null || true
          cp -r "$TORCH_DIR/share" libtorch/ 2>/dev/null || true
          # Copy bundled shared libs (OpenBLAS, gomp, ARM Compute Library)
          if [ -d "$TORCH_LIBS" ]; then
            cp "$TORCH_LIBS"/*.so* libtorch/lib/ 2>/dev/null || true
          fi
          tar czf "libtorch-cxx11-abi-aarch64-${{ inputs.torch_version }}.tar.gz" libtorch

      - name: Create release and upload
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v${{ inputs.torch_version }}"
          ASSET="libtorch-cxx11-abi-aarch64-${{ inputs.torch_version }}.tar.gz"
          gh release create "$TAG" --title "Libtorch aarch64 v${{ inputs.torch_version }}" --notes "Pre-built libtorch ${{ inputs.torch_version }} for Linux aarch64, packaged from pip." "$ASSET" || \
          gh release upload "$TAG" "$ASSET" --clobber
